name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  determine-target:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.determine.outputs.target }}
      version: ${{ steps.determine.outputs.version }}
    steps:
      - name: Determine publish target
        id: determine
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "target=pypi" >> $GITHUB_OUTPUT
            echo "::notice::Publishing stable version ${VERSION} to PyPI"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc|dev)[0-9]*$ ]]; then
            echo "target=testpypi" >> $GITHUB_OUTPUT
            echo "::notice::Publishing pre-release version ${VERSION} to TestPyPI"
          else
            echo "::error::Invalid version format: ${VERSION}"
            echo "target=none" >> $GITHUB_OUTPUT
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: determine-target
    if: needs.determine-target.outputs.target != 'none'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs:
      - determine-target
      - build
    if: needs.determine-target.outputs.target == 'testpypi'
    runs-on: ubuntu-latest

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.PYPI_TEST_API_TOKEN }}
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - determine-target
      - build
    if: needs.determine-target.outputs.target == 'pypi'
    runs-on: ubuntu-latest

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs:
      - determine-target
      - publish-to-pypi
    if: needs.determine-target.outputs.target == 'pypi'
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF#refs/tags/}"
          --repo="${GITHUB_REPOSITORY}"
          --title="Release ${GITHUB_REF#refs/tags/}"
          --generate-notes
          dist/*
