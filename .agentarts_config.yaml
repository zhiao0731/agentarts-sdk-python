agents:
  docker-test-agent:
    base:
      base_image: python:3.10-slim
      container_runtime: docker
      dependency_file: pyproject.toml
      entrypoint: server:run
      language: python3
      name: docker-test-agent
      platform: linux/amd64
      region: cn-north-4
    runtime:
      agent_gateway_id: null
      agent_id: null
      artifact_source:
        commands: []
        url: null
      environment_variables: []
      execution_agency_name: null
      identity_configuration:
        auth_type: IAM
        authorizer_configuration: null
      invoke_config:
        port: 8080
        protocol: HTTP
      network_config:
        network_mode: PUBLIC
        vpc_config:
          security_group_id: []
          subnet_id: null
          vpc_id: null
      observability:
        logs:
          enabled: false
        metrics:
          enabled: false
        tracing:
          enabled: false
      tags: []
    swr_config:
      organization: test-org
